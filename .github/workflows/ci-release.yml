name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # --- Continuous Integration Stage (Runs on pushes and PRs) ---
  ci:
    name: Build Lint Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Configure Go Environment
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Execute Makefile Build Target
        run: |
          make build

      - name: Run Golangci-Lint Runner
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
        
      - name: Execute Makefile Test Target
        run: |
          make test

  # --- Continuous Deployment Stage (Runs ONLY when a tag is pushed) ---
  release:
    name: Package Publish
    needs: ci                                 # Blocks release if the build, lint, or test steps fail
    if: startsWith(github.ref, 'refs/tags/v') # Strictly limits execution to tag pushes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Go Environment
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Run Makefile Release Target
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          VERSION=$TAG_VERSION make release

      - name: Publish Official GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*_checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Docker Build Workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCKER_REPO_TRIGGER_PAT }}
          repository: go-rivet/docker
          event-type: rivet-release
          client-payload: '{"version": "${{ github.ref_name }}"}'
